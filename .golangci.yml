version: "2"
run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - revive
    - cyclop
    - dupl

  settings:
    cyclop:
      max-complexity: 12

    revive:
      severity: warning

issues:
  max-issues-per-linter: 0
  max-same-issues: 0